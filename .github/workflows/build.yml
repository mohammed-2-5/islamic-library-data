name: Build Islamic Library Data

on:
  schedule:
    - cron: '0 3 1 * *'  # Monthly on the 1st at 3am UTC
  workflow_dispatch:       # Manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write


    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch hadith books
        run: python scripts/fetch_hadith_json.py

      - name: Fetch tafaseer
        run: python scripts/fetch_tafsir_api.py

      - name: Build catalog
        run: python scripts/build_catalog.py

      - name: Validate data
        run: python scripts/validate.py

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'Rebuild library data'
          file_pattern: 'data/**'
